# ~/.tmux.conf — sean — targets tmux >= 3.3 (tested on 3.4)
# (needs >= 3.3 for allow-passthrough; confirm your macOS tmux is >= 3.3.)
# Hand-rolled. Replaced gpakosz/oh-my-tmux on 2026-06-23; old version is in
# git history (devbox repo). Extend per-machine via ~/.tmux.conf.local (sourced
# at the bottom) — do NOT fork this file the way the old setup did.

# ── prefix ───────────────────────────────────────────────────────────────────
set  -g prefix C-a                            # GNU-screen-style prefix
unbind C-b
bind   C-a send-prefix                        # C-a C-a → send a literal C-a

# ── terminal / colour ────────────────────────────────────────────────────────
# screen-256color is present on every box, so TERM stays valid when this tmux
# runs on the Mac and you SSH into Linux targets (tmux-256color isn't guaranteed
# on remote/minimal hosts and would break full-screen apps there). Truecolor
# still works via the Tc/RGB overrides below — those key on the *outer* terminal
# (Ghostty), not on default-terminal.
set  -g  default-terminal "screen-256color"
set  -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"   # 24-bit truecolour
set  -as terminal-features  ",xterm-ghostty:RGB,xterm-256color:RGB"

# ── general behaviour ────────────────────────────────────────────────────────
set  -s  escape-time 10                        # don't swallow <Esc> (vim)
set  -g  repeat-time 600                        # window for -r repeatable keys
set  -s  focus-events on                        # forward focus in/out to apps
set  -g  history-limit 50000                    # roomy scrollback
set  -g  display-time 1000                       # status messages linger ~1s
set  -g  display-panes-time 800
set  -g  set-titles on
set  -g  set-titles-string "#h ❐ #S ● #I #W"
setw -g  mode-keys vi                            # vi keys in copy mode
set  -g  status-keys emacs                       # readline editing at the prompt

# ── windows & panes ──────────────────────────────────────────────────────────
set  -g  base-index 1                            # number windows from 1
setw -g  pane-base-index 1                        # number panes from 1
set  -g  renumber-windows on                      # keep window numbers gapless
setw -g  automatic-rename on                       # name window after its program
setw -g  aggressive-resize on                      # size to the smallest *viewing* client
set  -g  mouse on
set  -g  monitor-activity on
set  -g  visual-activity off

# ── clipboard ────────────────────────────────────────────────────────────────
# OSC 52 is the universal backbone: works over SSH and in Ghostty on both OSes.
# A local clipboard tool (pbcopy/wl-copy/xclip), when present, is layered on top
# in the copy-mode section below so local sessions also work in non-OSC52 terms.
set  -g  set-clipboard on                          # tmux emits OSC 52 on copy
set  -g  allow-passthrough on                       # let apps (nvim) pass OSC 52 through

# ── ssh agent: pin a stable socket so forwarding survives reconnects ─────────
# tmux's default update-environment list minus SSH_AUTH_SOCK, so new panes keep
# the pinned value below instead of re-importing a per-connection socket.
# (~/.ssh/ssh_auth_sock must be maintained by your ssh config / login rc.)
set    -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY KRB5CCNAME"
setenv -g SSH_AUTH_SOCK "$HOME/.ssh/ssh_auth_sock"

# ── config reload / edit ─────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf sourced"
bind e new-window -n "tmux.conf" "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"sourced\"'"

# ── sessions ─────────────────────────────────────────────────────────────────
bind C-c new-session
bind C-f command-prompt -p "find-session:" "switch-client -t '%%'"

# ── splits & new windows — open in the current pane's directory ──────────────
bind -  split-window -v -c "#{pane_current_path}"
bind |  split-window -h -c "#{pane_current_path}"
bind c  new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# ── vi-style pane navigation / resize ────────────────────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2
bind    > swap-pane -D
bind    < swap-pane -U
bind    + resize-pane -Z                          # zoom (native; replaces oh-my-tmux _maximize)

# ── window navigation ────────────────────────────────────────────────────────
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind    Tab last-window

# ── misc ─────────────────────────────────────────────────────────────────────
bind    m  set -g mouse \; display "mouse #{?mouse,on,off}"   # native mouse toggle
bind -n C-k send-keys C-l \; run 'sleep 0.1' \; clear-history  # clear screen + scrollback

# scrollback pickers — bound only when the tool is installed (otherwise inert).
# Buffer name is per-pane to avoid clobbering a user buffer or a concurrent run.
if-shell 'command -v urlview >/dev/null 2>&1' {
  bind U capture-pane -J -S - -E - -b "picker-#{pane_id}" \; split-window "tmux show-buffer -b 'picker-#{pane_id}' | urlview; tmux delete-buffer -b 'picker-#{pane_id}'"
}
if-shell 'command -v fpp >/dev/null 2>&1' {
  bind F capture-pane -J -S - -E - -b "picker-#{pane_id}" \; split-window "tmux show-buffer -b 'picker-#{pane_id}' | fpp; tmux delete-buffer -b 'picker-#{pane_id}'"
}

# ── copy mode (vi) ───────────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-selection-and-cancel
bind -T copy-mode-vi H      send -X start-of-line
bind -T copy-mode-vi L      send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel
# Layer a local clipboard tool over the OSC-52 default ONLY when one is actually
# usable. Crucially, a tool merely being installed isn't enough: over SSH into a
# Linux box, wl-copy/xclip may exist but have no display to talk to, so we gate
# them on $WAYLAND_DISPLAY / $DISPLAY. When none is usable (the SSH case) the
# base `y` above (OSC 52 via set-clipboard) stays in effect. Applied in reverse
# priority order so the last match wins: xclip < wl-copy < pbcopy.
if-shell '[ -n "$DISPLAY" ] && command -v xclip >/dev/null 2>&1' \
  'bind -T copy-mode-vi y                 send -X copy-pipe-and-cancel "xclip -i -selection clipboard" ; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -i -selection clipboard"'
if-shell '[ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1' \
  'bind -T copy-mode-vi y                 send -X copy-pipe-and-cancel "wl-copy" ; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"'
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind -T copy-mode-vi y                 send -X copy-pipe-and-cancel "pbcopy" ; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"'

# ── paste buffers ────────────────────────────────────────────────────────────
bind b list-buffers
bind p paste-buffer
bind P choose-buffer
# send the current tmux buffer to the OS clipboard: prefer a usable local tool
# (gated on a real display, same as copy-mode), else OSC 52 via `load-buffer -w`.
# Uses a temp file (preserves trailing newlines) and guards the empty-buffer case.
bind y run-shell 'f=$(mktemp); \
  if tmux save-buffer - >"$f" 2>/dev/null && [ -s "$f" ]; then \
    if   command -v pbcopy >/dev/null 2>&1;                              then pbcopy <"$f"; \
    elif [ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1; then wl-copy <"$f"; \
    elif [ -n "$DISPLAY" ] && command -v xclip >/dev/null 2>&1;          then xclip -i -selection clipboard <"$f"; \
    else tmux load-buffer -w "$f"; fi; \
    tmux display-message "buffer → clipboard"; \
  else tmux display-message "no buffer to copy"; fi; \
  rm -f "$f"'

# ── status line ──────────────────────────────────────────────────────────────
# palette: tokyonight_moon (matches Ghostty theme + nvim). If you change the
# Ghostty theme, update these hex values (or switch to ANSI names to auto-inherit).
#   bg #222436  bg_dark #1e2030  fg #c8d3f5  fg_dark #828bb8  comment #636da6
#   blue #82aaff  yellow #ffc777  orange #ff966c  gutter #3b4261  selection #2d3f76
set -g status on
set -g status-interval 15                          # battery/clock refresh cadence
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e2030,fg=#828bb8"
set -g status-left-length  40
set -g status-right-length 80

# session block (left) — blue accent, flips yellow while the prefix is pending
set -g status-left  "#[fg=#1e2030,bg=#{?client_prefix,#ffc777,#82aaff},bold] #S #[fg=#{?client_prefix,#ffc777,#82aaff},bg=#1e2030,nobold] "
# right: [ssh flag when active pane is ssh] · battery% (self-hides w/o a battery)
# · date/time · host block (#h = which box this tmux server runs on).
# Battery is cross-platform: pmset on macOS, /sys/class/power_supply on Linux.
set -g status-right "#{?#{==:#{pane_current_command},ssh},#[fg=#ffc777]ssh #[fg=#828bb8],}#[fg=#828bb8]#(if command -v pmset >/dev/null 2>&1; then pmset -g batt | grep -Eo '[0-9]+%' | head -1; else cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 | sed 's/$/%/'; fi) %a %d %b  %H:%M #[fg=#82aaff]#[fg=#1e2030,bg=#82aaff,bold] #h "

setw -g window-status-separator      ""
setw -g window-status-style          "fg=#828bb8,bg=#1e2030"
setw -g window-status-current-style  "fg=#1e2030,bg=#82aaff,bold"
setw -g window-status-activity-style "fg=#ff966c,bg=#1e2030"   # activity → orange text (no letter)
# index + name, plus a Z only when zoomed; current/last are shown by colour, not flags
setw -g window-status-format         " #I #W#{?window_zoomed_flag, Z,} "
setw -g window-status-current-format " #I #W#{?window_zoomed_flag, Z,} "

# active-pane cue = dim the inactive panes (opaque bg), not a coloured border —
# so there's no colour bleed at border junctions. Borders stay a uniform grey.
set -g window-style        "fg=#636da6,bg=terminal"   # inactive panes: muted text, real bg
set -g window-active-style "fg=terminal,bg=terminal"  # active pane: full-brightness text
set -g pane-border-style        "fg=#3b4261"
set -g pane-active-border-style "fg=#3b4261"
set -g message-style            "bg=#ffc777,fg=#1e2030,bold"
set -g message-command-style    "bg=#1e2030,fg=#ffc777,bold"
set -g mode-style               "bg=#2d3f76,fg=#c8d3f5,bold"   # copy-mode selection
set -g display-panes-active-colour "#82aaff"
set -g display-panes-colour        "#545c7e"

# ── per-machine overrides (the correct extension point) ──────────────────────
if-shell '[ -f ~/.tmux.conf.local ]' 'source-file ~/.tmux.conf.local'
